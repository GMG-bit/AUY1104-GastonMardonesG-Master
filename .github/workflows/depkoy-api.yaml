
name: Deploy API to Docker Hub
on:
  workflow_call:
    inputs:
      image_name:
        description: 'Nombre de la imagen Docker a construir y subir'
        required: true
        type: string
      image_tag:
        description: 'Tag de la imagen Docker (ej. latest, v1.0.0)'
        required: true
        default: 'latest'
        type: string
      # Permite ser llamado por otros repos
    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKER_PASSWORD:
        required: true
  workflow_dispatch:
    inputs:
      image_name:
        description: 'Nombre de la imagen Docker a construir y subir'
        required: true
        type: string
      image_tag:
        description: 'Tag de la imagen Docker (ej. latest, v1.0.0)'
        required: true
        default: 'latest'
        type: string
    # Permite ejecución manual desde GitHub UI
jobs:
  pasando-en-la-nube:
    name: Deploy API to Docker Hub
    runs-on: ubuntu-latest
    steps:
    # 1.  Checkout del código
    - name: Checkout-Descargo de código repositorio
      uses: actions/checkout@v4
    # 2. Credenciales de Docker Hub
    #La action docker/login-action@v2 maneja el proceso de autenticación de forma
    #segura — las credenciales nunca se escriben en texto plano en los logs. GitHub
    #Actions oculta automáticamente los valores de secretos en la salida del runner
    - name: Configure Docker Hub Credentials 
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    - name: Build and Push Docker Image
      run: |
        IMAGEN_COMPLETA="${{ secrets.DOCKER_USERNAME }}/${{ inputs.image_name }}:${{ inputs.image_tag }}"
        echo "Imagen a construir y subir: $IMAGEN_COMPLETA"
        docker build -t "${IMAGEN_COMPLETA}:${{inputs.image_tag}}"-t "${{IMAGEN_COMPLETA}}:latest".
        docker push --all-tags ${{ secrets.DOCKER_USERNAME }}/${{ inputs.image_name }}
#Build/Push comentado — diseño progresivo
#El step de build/push está comentado, lo que representa una buena práctica:
#primero se valida el pipeline completo (auth, checkout, estructura) y luego se
#habilita la funcionalidad de despliegue real. Esto permite identificar y corregir errores en etapas iniciales sin afectar el proceso de despliegue.
